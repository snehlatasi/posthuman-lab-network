server:
  port: ${PORT:8080}

spring:
  application:
    name: posthuman-lab-network
  
  datasource:
    url: jdbc:h2:file:${DB_PATH:./data/posthuman_db};AUTO_SERVER=TRUE
    username: ${DB_USER:sa}
    password: ${DB_PASS:}
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console
      settings:
        web-allow-others: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
